<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendamento Confirmado</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#1c1c1c;
  padding:30px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
  color:#00ff88;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 20px;
  background:#25D366;
  color:white;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="box">

<h1>✅ Agendamento Confirmado!</h1>

<p id="info"></p>

<a id="whats" class="btn" target="_blank">
💬 Falar no WhatsApp
</a>

</div>

<script>

const dados = JSON.parse(localStorage.getItem("agendamento"))

document.getElementById("info").innerHTML = `
Barbeiro: ${dados.barbeiro}<br>
Data: ${dados.data}<br>
Horário: ${dados.horario}
`

const mensagem = `Olá! Agendei um horário 💈

Barbeiro: ${dados.barbeiro}
Data: ${dados.data}
Horário: ${dados.horario}`

const telefone = "5551999999999" // 🔥 SEU NÚMERO

const url = `https://wa.me/${telefone}?text=${encodeURIComponent(mensagem)}`

document.getElementById("whats").href = url

</script>

</body>
</html>
