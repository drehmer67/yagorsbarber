<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendar Horário</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body class="pagina-barbeiros">

<div class="overlay">

<h1 class="titulo">Agendar Horário</h1>

<h2 id="barbeiroEscolhido"></h2>

<div class="formulario">

<input type="text" id="nome" placeholder="Seu nome">

<input type="date" id="data">

<button onclick="carregarHorarios()">VER HORÁRIOS</button>

<select id="horario">
<option>Escolha a data primeiro</option>
</select>

<input type="email" id="email" placeholder="Seu email">

<div class="servicos-box">
  <button onclick="toggleServicos()">Escolher serviços</button>

  <div id="listaServicos" class="lista-servicos">
    <label><input type="checkbox" value="corte"> Corte - R$30</label>
    <label><input type="checkbox" value="barba"> Barba - R$20</label>
    <label><input type="checkbox" value="cavanha"> cavanha - R$10</label>
    <label><input type="checkbox" value="sobrancelha"> sobrancelha - R$5</label>
    <label><input type="checkbox" value="combo"> corte + barba - R$50</label>
    <label><input type="checkbox" value="luzes"> luzes - R$100</label>
    <label><input type="checkbox" value="nevou"> nevou + corte - R$130</label>
  </div>
</div>

<button onclick="confirmar()">CONFIRMAR AGENDAMENTO</button>

</div>

</div>

<script>
function toggleServicos(){
  const lista = document.getElementById("listaServicos")

  if(lista.style.display === "flex"){
    lista.style.display = "none"
  } else {
    lista.style.display = "flex"
  }
}
const API = window.location.origin

const barbeiro = localStorage.getItem("barbeiro")

document.getElementById("barbeiroEscolhido").innerText = "Barbeiro: " + barbeiro


function carregarHorarios(){

const data = document.getElementById("data").value

if(!data){
alert("Escolha uma data primeiro")
return
}

fetch(`${API}/horarios/${barbeiro}/${data}`)
.then(res => res.json())
.then(horariosOcupados => {

const select = document.getElementById("horario")

const horarios = [
"08:00","08:30","09:00",
"09:30","10:00","10:30",
"11:00","13:30","14:00",
"14:30","15:00","15:30",
"16:00","16:30","17:00",
"17:30","18:00","18:30",
"19:00","19:30","20:00",
]

select.innerHTML = ""

horarios.forEach(h => {

const option = document.createElement("option")

option.value = h
option.text = h

if(horariosOcupados.includes(h)){
option.disabled = true
option.text = h + " (ocupado)"
}

select.appendChild(option)

})

})
.catch(error => {
console.log("Erro ao buscar horários:", error)
})

}

function confirmar(){

const nome = document.getElementById("nome").value
const data = document.getElementById("data").value
const horario = document.getElementById("horario").value
const email = document.getElementById("email").value

const checkboxes = document.querySelectorAll('#listaServicos input:checked')

let servicos = []
let total = 0

checkboxes.forEach(cb => {
  servicos.push(cb.value)

  if(cb.value === "corte") total += 30
  if(cb.value === "barba") total += 20
  if(cb.value === "sobrancelha") total += 10
})

if(servicos.length === 0){
  alert("Escolha pelo menos um serviço!")
  return
}


checkboxes.forEach(cb => {
  servicos.push(cb.value)

  if(cb.value === "corte") total += 30
  if(cb.value === "barba") total += 20
  if(cb.value === "sobrancelha") total += 10
})

if(!nome || !data || !horario || !email || !servico){
  alert("Preencha todos os campos!")
  return
}
if(servicos.length === 0){
  alert("Escolha pelo menos um serviço!")
  return
}

fetch(`/api/agendar`, {
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
 body: JSON.stringify({
  nome,
  barbeiro,
  data,
  horario,
  email,
  servicos,
  valor: total
})
})

.then(res => {
    if(!res.ok){
        throw new Error("Erro ao agendar")
    }
    return res.json()
})

.then(() => {

    // 💬 mensagem Whats
   const mensagem = `Olá! Agendei um horário 💈

Serviços: ${servicos.join(", ")}
Total: R$ ${total}

Barbeiro: ${barbeiro}
Data: ${data}
Horário: ${horario}`

    const telefone = "5551997861753" // seu número

    const url = `https://wa.me/${telefone}?text=${encodeURIComponent(mensagem)}`

    // abre WhatsApp
    window.open(url, "_blank")

    // salva dados
    localStorage.setItem("agendamento", JSON.stringify({
        barbeiro,
        data,
        horario
    }))

    // redireciona
    window.location.href = "confirmado.html"

})

.catch(error => {
    console.log("Erro:", error)
    alert("Erro ao agendar. Tenta de novo.")
})

}

</script>

</body>
</html>
